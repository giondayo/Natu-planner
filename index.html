<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fdf3f8">
  <title>Natural High 2026 · My Festival Planner</title>
  <meta name="description" content="Personal schedule planner for Natural High Healing Festival 2026">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
/* Natural High 2026 planner — airy light theme
   magenta→coral #8e447e→#ff7aac · aqua-mint #b5e7e1 · teal-pine #33645f · champagne */
:root {
  --night: #ffffff;        /* opaque light surface (grid head/rail, sticky) */
  --night-2: #f0f8f6;      /* soft panel */
  --card: #ffffff;         /* luminous cards */
  --card-edge: #d3e6e1;    /* soft mint-grey border */
  --ink: #1a3a34;          /* deep teal ink */
  --ink-dim: #5f827c;      /* muted teal */
  --gold: #bd9433;         /* champagne (readable as text on white) */
  --gold-soft: rgba(189,148,51,.16);
  --champagne: #dbaf48;    /* button + selection champagne — rgb(219,175,72) */
  --rose: #ff7aac;         /* signature coral-pink */
  --orchid: #8e447e;       /* deep magenta */
  --mint: #b5e7e1;         /* aqua-mint */
  --pine: #33645f;         /* teal-pine */
  --radius: 14px;
  --cat: #ff7aac;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background:
    radial-gradient(1100px 780px at 6% 0%, rgba(255,122,172,.34), transparent 60%),
    radial-gradient(1000px 760px at 98% 4%, rgba(181,231,225,.52), transparent 60%),
    radial-gradient(980px 860px at 92% 98%, rgba(142,68,126,.20), transparent 60%),
    radial-gradient(1020px 840px at 2% 100%, rgba(233,201,120,.46), transparent 60%),
    radial-gradient(720px 600px at 50% 46%, rgba(255,255,255,.55), transparent 62%),
    #fcfdfe;
  background-attachment: fixed;
  background-repeat: no-repeat;
  color: var(--ink);
  font-family: "Karla", system-ui, sans-serif;
  line-height: 1.45;
  padding-bottom: calc(58px + env(safe-area-inset-bottom));
}
a { color: var(--gold); }

/* ---------- header ---------- */
.top {
  position: sticky; top: 0; z-index: 20;
  background: linear-gradient(180deg, rgba(255,255,255,.82) 70%, rgba(255,255,255,.62));
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--card-edge);
  padding: 14px 16px 0;
}
.brand h1 {
  font-family: "Fraunces", serif;
  font-weight: 700; font-size: 1.45rem; margin: 0; letter-spacing: .01em;
}
.brand h1 span { color: var(--gold); font-weight: 400; }
.tagline {
  margin: 2px 0 10px; color: var(--ink-dim);
  font-size: .74rem; letter-spacing: .22em; text-transform: uppercase;
}
.days { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
.day-tab {
  flex: 1 0 auto; border: 1px solid var(--card-edge); background: transparent;
  color: var(--ink-dim); font: 500 .9rem "Karla", sans-serif;
  padding: 8px 14px; border-radius: 999px; cursor: pointer;
  transition: background .15s, color .15s;
}
.day-tab[aria-selected="true"] {
  background: var(--champagne); border-color: var(--champagne); color: #241a06; font-weight: 700;
}

/* ---------- bottom control bar & filters ---------- */
.bottombar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  background: linear-gradient(180deg, rgba(255,255,255,.80), var(--night) 60%);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--card-edge);
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
}
.toolbar-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: center; }
.chip {
  border: 1px solid var(--card-edge); background: var(--night-2); color: var(--ink);
  font: 500 .84rem "Karla", sans-serif; padding: 7px 12px; border-radius: 999px;
  cursor: pointer; transition: background .15s, border-color .15s;
}
.chip .count { color: var(--gold); font-weight: 700; }
.chip[aria-pressed="true"], .chip.on {
  background: var(--gold-soft); border-color: var(--gold); color: var(--gold);
}
.chip-plan[aria-pressed="true"] { background: var(--champagne); border-color: var(--champagne); color: #241a06; }
.chip-plan[aria-pressed="true"] .count { color: #241a06; }
.chip-ghost { background: transparent; color: var(--ink-dim); }
/* Filters button turns gold while its drawer is open → tap again to close */
#filterToggle[aria-expanded="true"] {
  background: var(--champagne); border-color: var(--champagne); color: #241a06; font-weight: 700;
}
#filterToggle[aria-expanded="true"] .count { color: #241a06; }
/* filter drawer rises upward from the bar */
.filter-panel {
  margin: 0 0 10px; padding: 12px; border: 1px solid var(--card-edge);
  border-radius: var(--radius); background: var(--night-2);
  max-height: 46vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.filter-label {
  margin: 10px 0 6px; font-size: .7rem; letter-spacing: .18em;
  text-transform: uppercase; color: var(--ink-dim);
}
.filter-label:first-child { margin-top: 0; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chips .chip { padding: 5px 10px; font-size: .8rem; }
.chips .chip.cat.on { color: var(--ink); border-color: var(--c); background: color-mix(in srgb, var(--c) 22%, transparent); }
.chips .chip .dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--c); margin-right: 5px; vertical-align: 1px;
}

/* ---------- schedule ---------- */
.schedule { padding: 8px 16px 12px; max-width: 720px; margin: 0 auto; }
.time-group { margin-top: 18px; }
.time-head {
  font-family: "Fraunces", serif; font-size: 1.05rem; color: var(--gold);
  margin: 0 0 8px; display: flex; align-items: center; gap: 10px;
}
.time-head::after { content: ""; flex: 1; height: 1px; background: var(--card-edge); }
.card {
  position: relative; width: 100%; text-align: left;
  background: var(--card); border: 1px solid var(--cat);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
  color: var(--ink); cursor: pointer; font-family: inherit;
  box-shadow: 0 0 9px -1px color-mix(in srgb, var(--cat) 45%, transparent);
  transition: transform .12s, border-color .15s, box-shadow .2s;
}
.card:active { transform: scale(.985); }
.card.attending {
  border-color: var(--champagne);
  box-shadow: 0 0 0 2px var(--champagne), 0 0 24px rgba(219,175,72,.55);
  background: linear-gradient(180deg, rgba(219,175,72,.26), rgba(219,175,72,.10)), var(--card);
}
.card-row { display: flex; align-items: baseline; gap: 8px; }
.card-time { font-size: .8rem; color: var(--ink-dim); white-space: nowrap; }
.card-title { font-weight: 700; font-size: .98rem; flex: 1; }
.card.attending .card-title { color: var(--gold); }
.card-info {
  display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: .82rem;
}
.ci-teacher {
  flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; color: var(--ink-dim);
}
.ci-loc {
  flex: 0 0 auto; display: inline-flex; align-items: center; gap: 4px; color: var(--pine);
}
.ci-loc svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }
.ci-loc.tbc { color: var(--ink-dim); font-style: italic; }
.card.attending .ci-loc:not(.tbc) { color: var(--gold); }
.card-info .badges { flex: 0 0 auto; }
.card-star {
  position: absolute; right: 10px; top: 8px; font-size: 1.1rem; line-height: 1;
  color: var(--card-edge);
}
.card.attending .card-star { color: var(--champagne); text-shadow: 0 0 12px rgba(219,175,72,.9); }
.badges { display: inline-flex; gap: 4px; margin-left: 6px; vertical-align: 1px; }
.badge {
  font-size: .62rem; font-weight: 700; padding: 1px 5px; border-radius: 5px;
  background: #fbeef5; border: 1px solid #f0c9dd; color: var(--orchid);
}
.empty { text-align: center; color: var(--ink-dim); padding: 48px 16px; }
.empty strong { color: var(--ink); font-family: "Fraunces", serif; }

/* ---------- detail sheet ---------- */
.overlay[hidden] { display: none; }
.overlay {
  position: fixed; inset: 0; z-index: 50; background: rgba(26,58,52,.42);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fade .18s ease;
}
.sheet {
  position: relative; width: 100%; max-width: 640px; max-height: 86vh;
  overflow-y: auto; background: var(--night-2);
  border: 1px solid var(--card-edge); border-bottom: none;
  border-radius: 20px 20px 0 0; padding: 22px 20px 32px;
  animation: rise .22s ease;
}
@keyframes rise { from { transform: translateY(24px); opacity: .6; } }
@keyframes fade { from { opacity: 0; } }
@media (prefers-reduced-motion: reduce) { .sheet, .overlay { animation: none; } }
.sheet-close {
  position: absolute; right: 14px; top: 14px; border: none; background: var(--card);
  color: var(--ink-dim); width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; font-size: .9rem;
}
.sheet h2 {
  font-family: "Fraunces", serif; font-size: 1.4rem; margin: 4px 40px 4px 0; line-height: 1.2;
}
.sheet .teacher { color: var(--orchid); font-weight: 600; margin: 0 0 14px; }
.sheet .cat-pill {
  display: inline-block; font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 3px 10px; border-radius: 999px;
  background: color-mix(in srgb, var(--cat) 22%, transparent);
  border: 1px solid var(--cat); color: var(--ink); margin-bottom: 10px;
}
.facts { margin: 0 0 14px; padding: 0; list-style: none; }
.facts li {
  display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--card-edge);
  font-size: .92rem;
}
.facts .k { width: 84px; flex-shrink: 0; color: var(--ink-dim); font-size: .78rem;
  text-transform: uppercase; letter-spacing: .1em; padding-top: 2px; }
.facts .tbc { color: var(--ink-dim); font-style: italic; }
.label-list { margin: 0 0 16px; padding: 0; list-style: none; font-size: .84rem; color: var(--ink-dim); }
.label-list li { padding: 2px 0; }
.label-list b { color: var(--rose); }
.attend-btn {
  width: 100%; padding: 14px; border-radius: var(--radius); border: 1px solid var(--gold);
  background: transparent; color: var(--gold); font: 700 1rem "Karla", sans-serif;
  cursor: pointer; transition: background .15s, color .15s;
}
.attend-btn.on { background: var(--champagne); border-color: var(--champagne); color: #241a06; }
.artist-link { display: block; text-align: center; margin-top: 12px; font-size: .88rem; }

/* ---------- footer ---------- */
.foot { max-width: 720px; margin: 0 auto; padding: 0 16px; }
.foot p { font-size: .74rem; color: var(--ink-dim); }

@media (min-width: 600px) {
  .brand h1 { font-size: 1.7rem; }
  .card-title { font-size: 1.05rem; }
}
:where(button, a):focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

/* ---------- v2: view switch, tappable stars, grid view, descriptions ---------- */
.view-switch { display: inline-flex; border-radius: 999px; overflow: hidden; border: 1px solid var(--card-edge); }
.view-switch .chip { border: none; border-radius: 0; background: var(--night-2); }
.view-switch .chip[aria-pressed="true"] { background: var(--champagne); color: #241a06; font-weight: 700; }

.star-btn {
  position: absolute; right: 2px; top: 2px; z-index: 2;
  width: 34px; height: 34px; border: none; background: transparent;
  color: var(--card-edge); font-size: 1.15rem; line-height: 1; cursor: pointer;
  transition: color .15s, transform .1s;
}
.star-btn:active { transform: scale(1.25); }
.star-btn.on { color: var(--champagne); text-shadow: 0 0 12px rgba(219,175,72,.95); }
.card { cursor: pointer; }
.card .card-title { padding-right: 26px; }

/* grid view */
.schedule.grid { padding: 8px 0 24px; max-width: none; }
.grid-scroll {
  overflow: auto; max-height: calc(100vh - 200px); min-height: 320px;
  -webkit-overflow-scrolling: touch; border-top: 1px solid var(--card-edge);
}
.grid-inner { position: relative; }
.g-head {
  position: sticky; top: 0; z-index: 6; display: flex;
  background: var(--night); border-bottom: 1px solid var(--card-edge); height: 54px;
}
.g-corner { position: sticky; left: 0; z-index: 7; background: var(--night); flex-shrink: 0; }
.g-venue {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 4px 8px;
  font-family: "Fraunces", serif; font-size: .82rem; color: var(--gold);
  border-left: 1px solid var(--card-edge);
}
.g-venue.tbc { color: var(--ink-dim); font-style: italic; }
.g-rail { position: sticky; left: 0; z-index: 5; background: var(--night); border-right: 1px solid var(--card-edge); }
.g-time {
  position: absolute; left: 0; right: 4px; text-align: right;
  font-size: .68rem; color: var(--ink-dim); transform: translateY(-1px);
}
.g-line { position: absolute; left: 0; height: 1px; background: rgba(51,100,95,.16); z-index: 0; }
.g-event {
  position: absolute; z-index: 1; overflow: hidden; cursor: pointer;
  background: var(--card); border: 1px solid var(--cat);
  box-shadow: 0 0 7px -1px color-mix(in srgb, var(--cat) 45%, transparent);
  border-radius: 8px; padding: 4px 6px 4px 7px; font-size: .72rem; line-height: 1.25;
}
.g-event .g-ev-time { display: block; color: var(--ink-dim); font-size: .64rem; padding-right: 22px; }
.g-event .g-ev-title { font-weight: 700; display: block; padding-right: 4px; }
.g-event .star-btn { width: 26px; height: 26px; font-size: .95rem; right: 0; top: 0; }
.g-event.attending {
  border-color: var(--champagne);
  background: linear-gradient(180deg, rgba(219,175,72,.32), rgba(219,175,72,.12)), var(--card);
  box-shadow: 0 0 0 1.5px var(--champagne), 0 0 16px rgba(219,175,72,.5); z-index: 3;
}
.g-event.attending .g-ev-title { color: #8a6a12; }

/* description in sheet */
.desc { margin: 4px 0 16px; padding: 12px 14px; background: var(--card); border: 1px solid var(--card-edge); border-radius: var(--radius); font-size: .92rem; }
.desc h3 { font-family: "Fraunces", serif; font-size: 1rem; color: var(--gold); margin: 10px 0 4px; }
.desc h3:first-child { margin-top: 0; }
.desc p { margin: 6px 0; }
.desc-loading { color: var(--ink-dim); font-style: italic; }

/* ---------- v3: exclude filters, compressed grid, artist nav ---------- */
.filter-hint { margin: 0 0 10px; font-size: .74rem; color: var(--ink-dim); }
.filter-hint .hint-inc { color: #a07b1f; font-weight: 700; }
.filter-hint .hint-exc { color: #c0466e; font-weight: 700; }

/* exclude state for any filter chip */
.chip.exclude {
  border-color: #d98aa8; background: #fbeef3; color: #b23a5f;
  text-decoration: line-through; text-decoration-color: rgba(178,58,95,.6);
}
.chips .chip.cat.exclude { color: #b23a5f; }
.chips .chip.cat.exclude .dot { background: #b23a5f; }

/* compressed grid: keep text tidy inside shorter blocks */
.g-venue { font-size: .76rem; padding: 3px 6px; }
.g-event { padding: 3px 5px 3px 7px; font-size: .7rem; line-height: 1.18; }
.g-event .g-ev-time { font-size: .6rem; padding-right: 20px; }
.g-event .g-ev-title {
  font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;
}
.g-event .star-btn { width: 22px; height: 22px; font-size: .85rem; }
.g-time { font-size: .62rem; }

/* back button */
.back-btn {
  display: inline-flex; align-items: center; gap: 4px; margin: 0 0 10px;
  border: 1px solid var(--card-edge); background: var(--card); color: var(--ink);
  font: 600 .82rem "Karla", sans-serif; padding: 6px 12px; border-radius: 999px; cursor: pointer;
}
.back-btn:active { transform: scale(.97); }

/* "More from <artist>" list */
.more { margin: 4px 0 8px; }
.more h3 { font-family: "Fraunces", serif; font-size: 1rem; color: var(--gold); margin: 0 0 8px; }
.more-item {
  display: grid; grid-template-columns: 16px 1fr; gap: 2px 6px; width: 100%; text-align: left;
  background: var(--card); border: 1px solid var(--cat);
  box-shadow: 0 0 6px -1px color-mix(in srgb, var(--cat) 40%, transparent);
  border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; color: var(--ink);
  font-family: inherit; cursor: pointer; transition: border-color .15s, background .15s;
}
.more-item:active { transform: scale(.99); }
.more-item.attending { border-color: var(--champagne); box-shadow: 0 0 0 1.5px var(--champagne); background: linear-gradient(180deg, rgba(219,175,72,.22), rgba(219,175,72,.09)), var(--card); }
.more-item .mi-star { grid-row: 1 / span 2; color: var(--gold); font-size: .9rem; line-height: 1.2; }
.more-item .mi-title { font-weight: 700; font-size: .9rem; }
.more-item .mi-meta { grid-column: 2; font-size: .76rem; color: var(--ink-dim); }

</style>
</head>
<body>

  <header class="top">
    <div class="brand">
      <h1>Natural High <span>2026</span></h1>
      <p class="tagline">Soulful · Beloved · Wildly Alive</p>
    </div>
    <nav class="days" id="dayTabs" aria-label="Festival days"></nav>
  </header>

  <main id="schedule" class="schedule" aria-live="polite"></main>

  <footer class="foot">
    <p>Unofficial planner · data from
      <a href="https://naturalhighfestival.fi/ohjelma/" target="_blank" rel="noopener">naturalhighfestival.fi</a>.
      Always double-check times &amp; venues in the
      <a href="https://www.naturalhighfestival.com/wp-content/uploads/2026/06/Natu_2026_OHJELMA.pdf" target="_blank" rel="noopener">official program</a>.
      Your plan is saved on this device only.</p>
  </footer>

  <nav class="bottombar" aria-label="Controls">
    <div id="filterPanel" class="filter-panel" hidden>
      <p class="filter-hint">Tap once to <b class="hint-inc">show only</b> · tap again to <b class="hint-exc">hide</b> · tap again to clear</p>
      <p class="filter-label">Category</p>
      <div class="chips" id="catChips"></div>
      <p class="filter-label">Labels</p>
      <div class="chips" id="labelChips"></div>
      <p class="filter-label">Language</p>
      <div class="chips" id="langChips"></div>
    </div>
    <div class="toolbar-row">
      <div class="view-switch" role="group" aria-label="View">
        <button id="viewGrid" class="chip" aria-pressed="false">Grid</button>
        <button id="viewList" class="chip" aria-pressed="false">List</button>
      </div>
      <button id="planToggle" class="chip chip-plan" aria-pressed="false">★ My plan <span id="planCount" class="count"></span></button>
      <button id="filterToggle" class="chip" aria-expanded="false">Filters <span id="filterCount" class="count"></span></button>
      <button id="clearFilters" class="chip chip-ghost" hidden>Clear</button>
    </div>
  </nav>

  <!-- Workshop detail sheet -->
  <div id="overlay" class="overlay" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <button class="sheet-close" id="sheetClose" aria-label="Close">✕</button>
      <div id="sheetBody"></div>
    </div>
  </div>

  <script>
// ============================================================
// Natural High Healing Festival 2026 – schedule data
// Source: naturalhighfestival.fi (program PDF + artist pages)
// Edit freely: each event is one object in EVENTS.
// venue: null  = venue not confirmed from the PDF grid –
//                check the official program and fill it in.
// labels: Y = yoga mat, S = strong, K = kids friendly,
//         N = nudity, B = not for beginners, K18 = adults only
// ============================================================

const DAYS = [
  { id: "thu", name: "Thursday" },
  { id: "fri", name: "Friday" },
  { id: "sat", name: "Saturday" },
  { id: "sun", name: "Sunday" },
];

const CATEGORIES = {
  yoga:      { name: "Yoga",                         color: "#7fb069" },
  tantra:    { name: "Tantra & Conscious Sexuality", color: "#d94f6b" },
  dance:     { name: "Dance & Body",                 color: "#e8843c" },
  sound:     { name: "Sound & Voice",                color: "#4ea5d9" },
  ceremony:  { name: "Ceremony & Performance",       color: "#9b6bce" },
  lecture:   { name: "Lecture",                      color: "#c9a227" },
  coaching:  { name: "Coaching",                     color: "#3aa79b" },
  meditation:{ name: "Meditation",                   color: "#7a86d6" },
  other:     { name: "Other Inspirations",           color: "#b0805e" },
  music:     { name: "Music",                        color: "#e05c9a" },
  dj:        { name: "DJ & Party",                   color: "#f2b04c" },
  ecstatic:  { name: "Ecstatic Dance",               color: "#e0653c" },
  kids:      { name: "Kids & Teens",                 color: "#6fc2e0" },
  special:   { name: "Festival Program",             color: "#cfa3ff" },
};

const VENUES = [
  "Wildly Alive Main Stage", "Hall of Transformation", "Red Temple",
  "Mystic Soul", "White Light Room", "Heart Space", "Art Cave",
  "Share & Play", "Wisdom Temple", "Flow of Life", "Divine Vision",
  "Beach Party Vibes", "Tiipii", "Teen Lounge",
  "Sandy Beach Sauna", "Healers Oasis", "Football Field",
];

const LABELS = {
  Y:   "Bring a yoga mat or something to lay on",
  S:   "Strong – may trigger intense emotional release",
  K:   "Kids friendly",
  N:   "May contain nudity",
  B:   "Not for beginners (neo-tantra)",
  K18: "Adults only (18+)",
};

// Artist page links on naturalhighfestival.fi
const ARTIST_URLS = {

/* Natural High 2026 planner — app logic (v2: grid view + live descriptions) */
(function () {
  "use strict";

  // ---------- state ----------
  const STORE_PLAN = "nh2026.plan";
  const STORE_DAY  = "nh2026.day";
  const STORE_VIEW = "nh2026.view";

  const state = {
    day: load(STORE_DAY, "thu"),
    view: load(STORE_VIEW, "list"),            // "list" | "grid"
    plan: new Set(load(STORE_PLAN, [])),
    planOnly: false,
    // filter maps: key -> 1 (include) | 2 (exclude); absent = neutral
    cats: new Map(), labels: new Map(), langs: new Map(),
  };
  if (!DAYS.some(d => d.id === state.day)) state.day = "thu";
  if (!["list", "grid"].includes(state.view)) state.view = "grid";

  function load(key, fallback) {
    try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; }
    catch { return fallback; }
  }
  function store(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }

  // ---------- helpers ----------
  const $ = s => document.querySelector(s);
  const byId = Object.fromEntries(EVENTS.map(ev => [ev.id, ev]));
  const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  // times 00:00–04:59 belong to the night of the same festival day
  const toMin = t => { const [h, m] = t.split(":").map(Number); return (h < 5 ? h + 24 : h) * 60 + m; };
  const hourLabel = h => String(h % 24).padStart(2, "0") + ":00";

  function langsOf(ev) {
    return ev.lang ? ev.lang.split("/").map(s => s.trim().toUpperCase()) : [];
  }

  // ---------- day tabs ----------
  const dayTabs = $("#dayTabs");
  DAYS.forEach(d => {
    const b = document.createElement("button");
    b.className = "day-tab"; b.textContent = d.name;
    b.setAttribute("role", "tab"); b.dataset.day = d.id;
    b.addEventListener("click", () => { state.day = d.id; store(STORE_DAY, d.id); render(); });
    dayTabs.appendChild(b);
  });

  // ---------- view switch ----------
  const viewBtns = { list: $("#viewList"), grid: $("#viewGrid") };
  Object.entries(viewBtns).forEach(([v, btn]) =>
    btn.addEventListener("click", () => { state.view = v; store(STORE_VIEW, v); render(); }));

  // ---------- filter chips ----------
  const catChips = $("#catChips");
  Object.entries(CATEGORIES).forEach(([key, c]) => {
    const b = document.createElement("button");
    b.className = "chip cat"; b.style.setProperty("--c", c.color);
    b.dataset.base = c.name;
    b.innerHTML = `<span class="dot"></span>${c.name}`;
    b.addEventListener("click", () => { cycle(state.cats, key, b); render(); });
    catChips.appendChild(b);
  });
  const labelChips = $("#labelChips");
  Object.entries(LABELS).forEach(([key, text]) => {
    const b = document.createElement("button");
    b.className = "chip";
    b.dataset.base = key + " · " + text.split(" (")[0].split(" – ")[0];
    b.textContent = b.dataset.base;
    b.title = text;
    b.addEventListener("click", () => { cycle(state.labels, key, b); render(); });
    labelChips.appendChild(b);
  });
  const langChips = $("#langChips");
  ["FIN", "ENG"].forEach(l => {
    const b = document.createElement("button");
    b.className = "chip"; b.dataset.base = l; b.textContent = l;
    b.addEventListener("click", () => { cycle(state.langs, l, b); render(); });
    langChips.appendChild(b);
  });
  // three-state cycle: neutral -> include -> exclude -> neutral
  function cycle(map, key, btn) {
    const s = map.get(key) || 0;
    const next = (s + 1) % 3;
    if (next === 0) map.delete(key); else map.set(key, next);
    paintChip(btn, next);
  }
  function paintChip(btn, s) {
    btn.classList.toggle("on", s === 1);
    btn.classList.toggle("exclude", s === 2);
    const base = btn.dataset.base;
    if (btn.querySelector(".dot"))
      btn.innerHTML = `<span class="dot"></span>${s === 2 ? "−&nbsp;" : ""}${base}`;
    else btn.textContent = (s === 2 ? "− " : "") + base;
  }

  // ---------- toolbar ----------
  const planToggle = $("#planToggle");
  planToggle.addEventListener("click", () => {
    state.planOnly = !state.planOnly;
    planToggle.setAttribute("aria-pressed", String(state.planOnly));
    render();
  });
  const filterToggle = $("#filterToggle");
  const filterPanel = $("#filterPanel");
  function setFilterOpen(open) {
    filterPanel.hidden = !open;
    filterToggle.setAttribute("aria-expanded", String(open));
  }
  filterToggle.addEventListener("click", e => {
    e.stopPropagation();
    setFilterOpen(filterPanel.hidden);
  });
  // tapping anywhere outside the bottom bar (schedule, header, a workshop…) closes it
  document.addEventListener("click", e => {
    if (!filterPanel.hidden && !e.target.closest(".bottombar")) setFilterOpen(false);
  });
  $("#clearFilters").addEventListener("click", () => {
    state.cats.clear(); state.labels.clear(); state.langs.clear();
    document.querySelectorAll(".filter-panel .chip").forEach(c => {
      c.classList.remove("on", "exclude");
      if (c.dataset.base) c.innerHTML = (c.querySelector(".dot") ? '<span class="dot"></span>' : "") + c.dataset.base;
    });
    render();
  });

  // ---------- filtering ----------
  const inc = map => [...map].filter(([, v]) => v === 1).map(([k]) => k);
  const exc = map => [...map].filter(([, v]) => v === 2).map(([k]) => k);

  function matches(ev) {
    if (state.planOnly && !state.plan.has(ev.id)) return false;

    // categories
    const ci = inc(state.cats), ce = exc(state.cats);
    if (ci.length && !ci.includes(ev.cat)) return false;
    if (ce.includes(ev.cat)) return false;

    // labels — include: must have ALL included labels; exclude: must have NONE
    const li = inc(state.labels), le = exc(state.labels);
    if (li.length && !li.every(l => ev.labels.includes(l))) return false;
    if (le.some(l => ev.labels.includes(l))) return false;

    // language — include: matches ANY included; exclude: matches NONE
    const gi = inc(state.langs), ge = exc(state.langs);
    const evLangs = langsOf(ev);
    if (gi.length && !gi.some(l => evLangs.includes(l))) return false;
    if (ge.length && ge.some(l => evLangs.includes(l))) return false;

    return true;
  }

  // ---------- plan ----------
  function togglePlan(id) {
    const has = state.plan.has(id);
    has ? state.plan.delete(id) : state.plan.add(id);
    store(STORE_PLAN, [...state.plan]);

    // In "My plan" mode, membership changes which items are visible → full render.
    if (state.planOnly) { render(); return; }

    // Otherwise update just the affected element(s) in place — no rebuild, so the
    // grid's horizontal/vertical scroll position is preserved.
    const on = !has;
    document.querySelectorAll(`[data-star="${CSS.escape(id)}"]`).forEach(btn => {
      btn.classList.toggle("on", on);
      btn.setAttribute("aria-pressed", String(on));
      const box = btn.closest(".card, .g-event, .more-item");
      if (box) box.classList.toggle("attending", on);
    });
    const pc = $("#planCount");
    if (pc) pc.textContent = state.plan.size ? `(${state.plan.size})` : "";
  }
  function starHTML(ev) {
    const on = state.plan.has(ev.id);
    return `<button class="star-btn ${on ? "on" : ""}" data-star="${ev.id}"
              aria-pressed="${on}" aria-label="${on ? "Remove from" : "Add to"} my plan">★</button>`;
  }
  // one delegated handler: star taps toggle, other taps open the sheet
  document.addEventListener("click", e => {
    const star = e.target.closest("[data-star]");
    if (star) { e.stopPropagation(); togglePlan(star.dataset.star); return; }
    const block = e.target.closest("[data-event]");
    if (block) openSheet(block.dataset.event);
  });

  // ---------- render ----------
  const scheduleEl = $("#schedule");

  function render() {
    dayTabs.querySelectorAll(".day-tab").forEach(t =>
      t.setAttribute("aria-selected", String(t.dataset.day === state.day)));
    Object.entries(viewBtns).forEach(([v, btn]) =>
      btn.setAttribute("aria-pressed", String(v === state.view)));

    $("#planCount").textContent = state.plan.size ? `(${state.plan.size})` : "";
    const nFilters = state.cats.size + state.labels.size + state.langs.size;
    $("#filterCount").textContent = nFilters ? `(${nFilters})` : "";
    $("#clearFilters").hidden = nFilters === 0;

    const events = EVENTS.filter(ev => ev.day === state.day && matches(ev))
                         .sort((a, b) => toMin(a.start) - toMin(b.start));
    scheduleEl.innerHTML = "";
    scheduleEl.className = "schedule " + state.view;

    if (!events.length) {
      scheduleEl.innerHTML = `<div class="empty"><strong>Nothing here.</strong><br>
        ${state.planOnly ? "You haven't starred any workshops for this day yet — tap a ★ to add one."
                         : "Try removing some filters."}</div>`;
      return;
    }
    state.view === "grid" ? renderGrid(events) : renderList(events);
  }

  // ---------- list view ----------
  function renderList(events) {
    let currentHour = null, groupEl = null;
    events.forEach(ev => {
      const h = Math.floor(toMin(ev.start) / 60);
      if (h !== currentHour) {
        currentHour = h;
        groupEl = document.createElement("section");
        groupEl.className = "time-group";
        groupEl.innerHTML = `<h2 class="time-head">${hourLabel(h)}${h >= 24 ? " · after midnight" : ""}</h2>`;
        scheduleEl.appendChild(groupEl);
      }
      const c = CATEGORIES[ev.cat] || CATEGORIES.other;
      const div = document.createElement("div");
      div.className = "card" + (state.plan.has(ev.id) ? " attending" : "");
      div.style.setProperty("--cat", c.color);
      div.dataset.event = ev.id;
      div.setAttribute("role", "button"); div.tabIndex = 0;
      const badges = ev.labels.map(l => `<span class="badge" title="${esc(LABELS[l] || l)}">${l}</span>`).join("");
      div.innerHTML = `
        ${starHTML(ev)}
        <div class="card-row">
          <span class="card-time">${ev.start}–${ev.end}</span>
          <span class="card-title">${esc(ev.title)}</span>
        </div>
        <div class="card-info">
          <span class="ci-teacher">${esc(ev.teacher || "")}</span>
          ${badges ? `<span class="badges">${badges}</span>` : ""}
          <span class="ci-loc ${ev.venue ? "" : "tbc"}">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1112 6.5a2.5 2.5 0 010 5z"/></svg>
            <span>${ev.venue ? esc(ev.venue) : "Venue TBC"}</span>
          </span>
        </div>`;
      groupEl.appendChild(div);
    });
  }

  // ---------- grid view (venues × time) ----------
  const PX_PER_MIN = 0.82, COL_W = 120, TIME_W = 40, HEAD_H = 42;

  function packLanes(evts) { // assign overlapping events to side-by-side lanes
    const lanes = [];
    evts.forEach(ev => {
      const s = toMin(ev.start), e = Math.max(toMin(ev.end), s + 30);
      let li = lanes.findIndex(end => end <= s);
      if (li === -1) { li = lanes.length; lanes.push(0); }
      lanes[li] = e;
      ev._lane = li;
    });
    return lanes.length;
  }

  function renderGrid(events) {
    // columns: venues (in VENUES order) that have events today, then a TBC column
    const cols = [];
    VENUES.forEach(v => {
      const evts = events.filter(ev => ev.venue === v);
      if (evts.length) cols.push({ name: v, evts });
    });
    const tbc = events.filter(ev => !ev.venue);
    if (tbc.length) cols.push({ name: "Venue TBC", evts: tbc, tbc: true });

    const t0 = Math.floor(Math.min(...events.map(ev => toMin(ev.start))) / 60) * 60;
    const t1 = Math.ceil(Math.max(...events.map(ev => Math.max(toMin(ev.end), toMin(ev.start) + 30))) / 60) * 60;
    const bodyH = (t1 - t0) * PX_PER_MIN;

    cols.forEach(col => { col.lanes = packLanes(col.evts); col.w = Math.max(COL_W, col.lanes * 108); });
    const totalW = TIME_W + cols.reduce((s, c) => s + c.w, 0);

    const scroll = document.createElement("div");
    scroll.className = "grid-scroll";
    const inner = document.createElement("div");
    inner.className = "grid-inner";
    inner.style.width = totalW + "px";
    inner.style.height = (HEAD_H + bodyH) + "px";
    scroll.appendChild(inner);

    // venue header (sticky top)
    const head = document.createElement("div");
    head.className = "g-head";
    head.innerHTML = `<div class="g-corner" style="width:${TIME_W}px"></div>` +
      cols.map(c => `<div class="g-venue ${c.tbc ? "tbc" : ""}" style="width:${c.w}px">${esc(c.name)}</div>`).join("");
    inner.appendChild(head);

    // time rail (sticky left) + hour lines
    const rail = document.createElement("div");
    rail.className = "g-rail";
    rail.style.width = TIME_W + "px"; rail.style.height = bodyH + "px";
    for (let t = t0; t < t1; t += 60) {
      const y = (t - t0) * PX_PER_MIN;
      rail.insertAdjacentHTML("beforeend",
        `<div class="g-time" style="top:${y}px">${hourLabel(t / 60)}</div>`);
      inner.insertAdjacentHTML("beforeend",
        `<div class="g-line" style="top:${HEAD_H + y}px;width:${totalW}px"></div>`);
    }
    inner.appendChild(rail);

    // event blocks
    let x = TIME_W;
    cols.forEach(col => {
      const laneW = col.w / col.lanes;
      col.evts.forEach(ev => {
        const s = toMin(ev.start), e = Math.max(toMin(ev.end), s + 30);
        const c = CATEGORIES[ev.cat] || CATEGORIES.other;
        const el = document.createElement("div");
        el.className = "g-event" + (state.plan.has(ev.id) ? " attending" : "");
        el.dataset.event = ev.id;
        el.setAttribute("role", "button"); el.tabIndex = 0;
        el.style.setProperty("--cat", c.color);
        el.style.left = (x + ev._lane * laneW + 2) + "px";
        el.style.top = (HEAD_H + (s - t0) * PX_PER_MIN) + "px";
        el.style.width = (laneW - 5) + "px";
        el.style.height = ((e - s) * PX_PER_MIN - 3) + "px";
        el.innerHTML = `${starHTML(ev)}
          <span class="g-ev-time">${ev.start}–${ev.end}</span>
          <span class="g-ev-title">${esc(ev.title)}</span>`;
        inner.appendChild(el);
      });
      x += col.w;
    });

    scheduleEl.appendChild(scroll);
  }

  // ---------- workshop descriptions, live from naturalhighfestival.fi ----------
  // The site is WordPress: its public REST API allows cross-origin GETs, so we
  // fetch the artist page content on demand and cache it in localStorage.
  const descCache = load("nh2026.desc", {});
  const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9åäö ]/gi, " ").replace(/\s+/g, " ").trim();

  async function fetchArtistSections(url) {
    const slug = new URL(url).pathname.replace(/\//g, "");
    if (descCache[slug]) return descCache[slug];
    let html = null;
    for (const type of ["posts", "pages"]) {
      try {
        const r = await fetch(`https://naturalhighfestival.fi/wp-json/wp/v2/${type}?slug=${slug}&_fields=content`);
        if (!r.ok) continue;
        const arr = await r.json();
        if (arr.length) { html = arr[0].content.rendered; break; }
      } catch { /* try next */ }
    }
    if (!html) return null;
    // split content into { bio, sections: [{title, text}] } by h-headings
    const doc = new DOMParser().parseFromString(html, "text/html");
    const out = { bio: "", sections: [] };
    let cur = null;
    doc.body.querySelectorAll("h1,h2,h3,h4,h5,p,li").forEach(el => {
      const txt = el.textContent.replace(/\s+/g, " ").trim();
      if (!txt) return;
      if (/^H[1-5]$/.test(el.tagName)) {
        cur = { title: txt, text: "" };
        out.sections.push(cur);
      } else if (cur) cur.text += (cur.text ? "\n\n" : "") + txt;
      else out.bio += (out.bio ? "\n\n" : "") + txt;
    });
    descCache[slug] = out;
    store("nh2026.desc", descCache);
    return out;
  }

  function pickSection(data, title) {
    const t = norm(title);
    return data.sections.find(s => { const n = norm(s.title); return n && (t.includes(n) || n.includes(t)); })
        || data.sections.find(s => { const w = norm(s.title).split(" ").filter(x => x.length > 3);
                                     return w.length && w.every(x => t.includes(x)); });
  }

  // ---------- detail sheet (with navigation stack) ----------
  const overlay = $("#overlay");
  const sheetBody = $("#sheetBody");
  const sheetEl = document.querySelector(".sheet");
  let navStack = [], currentId = null;

  // group workshops by the same teacher string (predictable & always local)
  const byTeacher = {};
  EVENTS.forEach(ev => { if (ev.teacher) (byTeacher[ev.teacher] ||= []).push(ev); });

  function openSheet(id) { navStack = []; showSheet(id); }        // fresh (from schedule)
  function pushSheet(id) { if (currentId) navStack.push(currentId); showSheet(id); } // drill in
  function backSheet() { if (navStack.length) showSheet(navStack.pop()); }

  function showSheet(id) {
    currentId = id;
    const ev = byId[id];
    const c = CATEGORIES[ev.cat] || CATEGORIES.other;
    const day = DAYS.find(d => d.id === ev.day).name;
    const inPlan = state.plan.has(id);
    const url = ev.teacher && ARTIST_URLS[ev.teacher];
    const siblings = (ev.teacher ? byTeacher[ev.teacher] : []).filter(e => e.id !== id);

    sheetBody.innerHTML = `
      ${navStack.length ? `<button class="back-btn" data-back="1">← Back</button>` : ""}
      <span class="cat-pill" style="--cat:${c.color}">${c.name}</span>
      <h2 id="sheetTitle">${esc(ev.title)}</h2>
      ${ev.teacher ? `<p class="teacher">${esc(ev.teacher)}</p>` : ""}
      <ul class="facts">
        <li><span class="k">When</span><span>${day} ${ev.start}–${ev.end}</span></li>
        <li><span class="k">Where</span><span>${ev.venue ? esc(ev.venue) : '<span class="tbc">Venue TBC — check the official program</span>'}</span></li>
        ${ev.lang ? `<li><span class="k">Language</span><span>${esc(ev.lang)}</span></li>` : ""}
      </ul>
      ${ev.labels.length ? `<ul class="label-list">${
          ev.labels.map(l => `<li><b>${l}</b> — ${esc(LABELS[l] || l)}</li>`).join("")}</ul>` : ""}
      <button class="attend-btn ${inPlan ? "on" : ""}" data-star="${ev.id}" data-sheet="1">
        ${inPlan ? "★ In my plan — tap to remove" : "☆ Add to my plan"}
      </button>
      ${url ? `<div class="desc" id="descBox"><span class="desc-loading">Fetching info from the festival site…</span></div>` : ""}
      ${siblings.length ? `
        <div class="more">
          <h3>More from ${esc(ev.teacher)}</h3>
          ${siblings.map(s => {
            const sc = CATEGORIES[s.cat] || CATEGORIES.other;
            const sd = DAYS.find(d => d.id === s.day).name;
            return `<button class="more-item ${state.plan.has(s.id) ? "attending" : ""}" data-goto="${s.id}" style="--cat:${sc.color}">
              <span class="mi-star">${state.plan.has(s.id) ? "★" : ""}</span>
              <span class="mi-title">${esc(s.title)}</span>
              <span class="mi-meta">${sd} · ${s.start}–${s.end}${s.venue ? " · " + esc(s.venue) : ""}</span>
            </button>`;
          }).join("")}
        </div>` : ""}
      ${url ? `<a class="artist-link" href="${url}" target="_blank" rel="noopener">Open ${esc(ev.teacher)}'s full page →</a>` : ""}
    `;
    overlay.hidden = false;
    document.body.style.overflow = "hidden";
    if (sheetEl) sheetEl.scrollTop = 0;
    if (url) loadDesc(ev, url);
  }

  async function loadDesc(ev, url) {
    const box = $("#descBox");
    try {
      const data = await fetchArtistSections(url);
      if (!box || currentId !== ev.id) return;      // sheet closed or navigated away
      if (!data) throw new Error("no data");
      const section = pickSection(data, ev.title);
      const parts = [];
      if (section) {
        parts.push(`<h3>${esc(section.title)}</h3><p>${esc(section.text).replace(/\n\n/g, "</p><p>")}</p>`);
        if (data.bio) parts.push(`<h3>About ${esc(ev.teacher)}</h3><p>${esc(data.bio).replace(/\n\n/g, "</p><p>")}</p>`);
      } else {
        if (data.bio) parts.push(`<p>${esc(data.bio).replace(/\n\n/g, "</p><p>")}</p>`);
        data.sections.forEach(s =>
          parts.push(`<h3>${esc(s.title)}</h3><p>${esc(s.text).replace(/\n\n/g, "</p><p>")}</p>`));
      }
      box.innerHTML = parts.join("") || `<p class="tbc">No description found — see the artist page below.</p>`;
    } catch {
      if (box && currentId === ev.id)
        box.innerHTML = `<p class="tbc">Couldn't reach the festival site from here — use the artist page link below.</p>`;
    }
  }

  // delegated clicks inside the sheet: drill-in and back
  document.addEventListener("click", e => {
    const goto = e.target.closest("[data-goto]");
    if (goto) { e.stopPropagation(); pushSheet(goto.dataset.goto); return; }
    const back = e.target.closest("[data-back]");
    if (back) { e.stopPropagation(); backSheet(); return; }
    // keep the attend button + its "More from" twin in sync after a star toggle
    const btn = e.target.closest("[data-sheet]");
    if (btn) {
      const on = state.plan.has(btn.dataset.star);
      btn.classList.toggle("on", on);
      btn.innerHTML = on ? "★ In my plan — tap to remove" : "☆ Add to my plan";
    }
  });

  function closeSheet() {
    overlay.hidden = true; currentId = null; navStack = [];
    document.body.style.overflow = "";
  }
  $("#sheetClose").addEventListener("click", closeSheet);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeSheet(); });
  document.addEventListener("keydown", e => {
    if (overlay.hidden) return;
    if (e.key === "Escape") { navStack.length ? backSheet() : closeSheet(); }
  });

  render();
})();

</script>
</body>
</html>
